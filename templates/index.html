<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>FaceTrack Attendance System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{

            background:#f4f6f9;
        }

        /* Navbar */

        .navbar{

            background:#111827;
            color:white;
            padding:20px;
            text-align:center;
            font-size:28px;
            font-weight:bold;
            letter-spacing:1px;
        }

        /* Main container */

        .container{

            display:flex;
            justify-content:center;
            align-items:center;
            height:85vh;
        }

        /* Card */

        .card{

            background:white;
            width:420px;
            padding:40px;
            border-radius:20px;
            box-shadow:0 0 25px rgba(0,0,0,0.15);
            text-align:center;
        }

        .card h1{

            color:#111827;
            margin-bottom:15px;
        }

        .card p{

            color:gray;
            margin-bottom:30px;
            font-size:16px;
        }

        /* Buttons */

        .btn{

            width:100%;
            padding:15px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
            color:white;
            transition:0.3s;
        }

        .start-btn{
            background:#16a34a;
        }

        .record-btn{
            background:#2563eb;
        }

        .register-btn{
            background:#ea580c;
        }

        .btn:hover{

            opacity:0.9;
            transform:scale(1.02);
        }

        a{
            text-decoration:none;
        }

    </style>

</head>

<body>

    <!-- Navbar -->

    <div class="navbar">

        FaceTrack Attendance System

    </div>

    <!-- Main Section -->

    <div class="container">

        <div class="card">

            <h1>Welcome</h1>

            <p>
                Smart Face Recognition Attendance System
            </p>

            <!-- Start Attendance -->

            <a href="/start">

                <button class="btn start-btn">

                    Start Attendance

                </button>

            </a>

            <!-- Attendance Records -->

            <a href="/records">

                <button class="btn record-btn">

                    View Attendance

                </button>

            </a>

            <!-- Register Student -->

            <a href="/register">

                <button class="btn register-btn">

                    Register Student

                </button>

            </a>

        </div>

    </div>

</body>

</html>
