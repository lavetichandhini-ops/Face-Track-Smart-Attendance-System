<!DOCTYPE html>
<html>

<head>

    <title>Register Student</title>

    <style>

        body{

            font-family: Arial;
            background:#f2f2f2;
            text-align:center;
            margin-top:100px;
        }

        .box{

            background:white;
            width:400px;
            margin:auto;
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.2);
        }

        input{

            width:100%;
            padding:12px;
            margin-top:20px;
            font-size:18px;
        }

        button{

            margin-top:20px;
            width:100%;
            padding:15px;
            border:none;
            background:green;
            color:white;
            font-size:18px;
            border-radius:10px;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>Register Student</h1>

        <form action="/capture" method="POST">

            <input
                type="text"
                name="student_name"
                placeholder="Enter Student Name"
                required
            >

            <button type="submit">

                Capture Face

            </button>

        </form>

    </div>

</body>

</html>
