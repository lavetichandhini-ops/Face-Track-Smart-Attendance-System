<!DOCTYPE html>
<html>

<head>

    <title>Admin Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial;
        }

        body{

            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{

            background:white;
            padding:40px;
            width:400px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.15);
            text-align:center;
        }

        h1{

            margin-bottom:25px;
            color:#111827;
        }

        input{

            width:100%;
            padding:14px;
            margin-top:15px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{

            width:100%;
            padding:15px;
            margin-top:20px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{

            background:#1d4ed8;
        }

        .error{

            color:red;
            margin-top:15px;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h1>Admin Login</h1>

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">

                Login

            </button>

        </form>

        {% if error %}

        <div class="error">

            {{ error }}

        </div>

        {% endif %}

    </div>

</body>

</html>
